<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Date Game 💘</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
        body {
          height:100vh;
          display:flex;
          justify-content:center;
          align-items:center;
          background:#0f0f1a;
          overflow:hidden;
          color:white;
        }

        .blob, .blob2 {
          position:absolute;
          width:350px;
          height:350px;
          border-radius:50%;
          filter:blur(130px);
          opacity:.35;
          animation:float 12s ease-in-out infinite alternate;
        }
        .blob { background:#ff4d6d; top:10%; left:10%; }
        .blob2 { background:#9d4edd; top:60%; left:70%; animation-delay:2s; }

        @keyframes float {
          0%{ transform:translate(0,-30px); }
          50%{ transform:translate(20px,30px); }
          100%{ transform:translate(-20px,-30px); }
        }

        .card {
          position:relative;
          width:95%;
          max-width:600px;
          padding:45px;
          border-radius:30px;
          background:rgba(255,255,255,0.06);
          backdrop-filter:blur(30px);
          border:1px solid rgba(255,255,255,0.12);
          box-shadow:0 0 60px rgba(255,0,120,.25);
          transition:transform .3s ease, box-shadow .3s ease;
        }
        .card:hover { transform:rotateX(2deg) translateY(-5px); box-shadow:0 0 70px rgba(255,0,120,.35); }

        .tabs {
          position:relative;
          display:flex;
          justify-content:space-between;
          margin-bottom:30px;
          background:rgba(255,255,255,0.05);
          padding:6px;
          border-radius:30px;
        }
        .tab-btn {
          flex:1;
          padding:10px;
          border:none;
          background:transparent;
          color:white;
          font-weight:600;
          cursor:pointer;
          position:relative;
          z-index:2;
        }
        .tab-indicator {
          position:absolute;
          top:0;
          left:0;
          width:0;
          height:100%;
          background:linear-gradient(90deg,#ff4d6d,#c77dff);
          border-radius:30px;
          transition:left .4s ease,width .4s ease;
          z-index:1;
        }

        .section {
          display:none;
          animation:fadeIn .4s ease forwards;
        }
        .section.active { display:block; }

        @keyframes fadeIn {
          from{opacity:0; transform:translateY(10px);}
          to{opacity:1; transform:translateY(0);}
        }

        .pills { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:25px; justify-content:center; }
        .pill {
          padding:7px 16px;
          border-radius:20px;
          background:rgba(255,255,255,0.05);
          border:1px solid rgba(255,255,255,0.15);
          font-size:.85rem;
          cursor:pointer;
          transition:.3s ease, transform .2s ease;
        }
        .pill.active { background:linear-gradient(90deg,#ff4d6d,#c77dff); box-shadow:0 0 15px rgba(199,125,255,.8); animation:pulse 2s infinite; }
        .pill:hover{ transform:scale(1.05); }

        @keyframes pulse{
          0%{box-shadow:0 0 15px rgba(199,125,255,.8);}
          50%{box-shadow:0 0 25px rgba(255,0,120,.9);}
          100%{box-shadow:0 0 15px rgba(199,125,255,.8);}
        }

        .generate {
          padding:14px 24px;
          border-radius:40px;
          border:none;
          font-weight:600;
          cursor:pointer;
          background:linear-gradient(90deg,#ff4d6d,#c77dff);
          color:white;
          box-shadow:0 0 20px rgba(255,0,120,.6);
          transition:.3s ease, transform .2s ease;
          display:block;
          margin:0 auto;
        }
        .generate:hover { transform:scale(1.05) translateY(-2px); }

        .dual-buttons{ display:flex; justify-content:center; gap:15px; }

        .result-card {
          margin:30px auto 0 auto;
          padding:20px;
          border-radius:20px;
          background:rgba(255,255,255,0.07);
          border:1px solid rgba(255,255,255,0.15);
          min-height:90px;
          font-size:1rem;
          line-height:1.5;
          opacity:0;
          transform:translateY(10px) rotateX(5deg);
          transition:all .4s ease;
          text-align:center;
          display:flex;
          justify-content:center;
          align-items:center;
        }
        .result-card.show{ opacity:1; transform:translateY(0) rotateX(0deg); }

    </style>
</head>
<body>

<div class="blob"></div>
<div class="blob2"></div>

<div class="card">

    <div class="tabs">
        <div class="tab-indicator" id="indicator"></div>
        <button class="tab-btn active" data-tab="questions">Questions 💘</button>
        <button class="tab-btn" data-tab="game">Truth or Dare 🔥</button>
    </div>

    <!-- Questions Section -->
    <div class="section active" id="questions">
        <div class="pills" id="questionPills">
            <div class="pill active" data-category="family">Family</div>
            <div class="pill" data-category="friends">Friends</div>
            <div class="pill" data-category="dating">Dating</div>
            <div class="pill" data-category="passions">Passions</div>
        </div>
        <button class="generate" onclick="generateQuestion()">Generate Question ✨</button>
    </div>

    <!-- Game Section -->
    <div class="section" id="game">
        <div class="pills" id="gamePills">
            <div class="pill active" data-mode="safe">Safe</div>
            <div class="pill" data-mode="deep">Deep</div>
            <div class="pill" data-mode="spicy">Spicy</div>
        </div>
        <div class="dual-buttons">
            <button class="generate" onclick="generateTruth()">Truth 💗</button>
            <button class="generate" onclick="generateDare()">Dare 🔥</button>
        </div>
    </div>

    <div class="result-card" id="result"></div>

</div>

<script>
    const tabs = document.querySelectorAll(".tab-btn");
    const sections = document.querySelectorAll(".section");
    const indicator = document.getElementById("indicator");

    tabs.forEach(tab=>{
      tab.addEventListener("click",()=>{
        tabs.forEach(t=>t.classList.remove("active"));
        tab.classList.add("active");
        sections.forEach(s=>s.classList.remove("active"));
        document.getElementById(tab.dataset.tab).classList.add("active");
        indicator.style.width = tab.offsetWidth+"px";
        indicator.style.left = tab.offsetLeft+"px";
      });
    });

    // Initialize indicator
    indicator.style.width = tabs[0].offsetWidth+"px";
    indicator.style.left = tabs[0].offsetLeft+"px";

    let currentCategory = "family";
    document.querySelectorAll("#questionPills .pill").forEach(pill=>{
      pill.addEventListener("click",()=>{
        document.querySelectorAll("#questionPills .pill").forEach(p=>p.classList.remove("active"));
        pill.classList.add("active");
        currentCategory = pill.dataset.category;
      });
    });

    let currentMode = "safe";
    document.querySelectorAll("#gamePills .pill").forEach(pill=>{
      pill.addEventListener("click",()=>{
        document.querySelectorAll("#gamePills .pill").forEach(p=>p.classList.remove("active"));
        pill.classList.add("active");
        currentMode = pill.dataset.mode;
      });
    });

    const questions = {
      family:[
        "What’s your favourite family tradition?",
        "Are you close with your family?",
        "Who in your family are you most like?"
      ],
      friends:[
        "How did you meet your closest friend?",
        "What do your friends tease you about?",
        "Are you the planner or chaotic friend?"
      ],
      dating:[
        "What did your last relationship teach you?",
        "What’s a green flag for you?",
        "What’s your ideal first date?"
      ],
      passions:[
        "What could you talk about for hours?",
        "What are you currently obsessed with?",
        "What hobby would you love to start?"
      ]
    };

    const truths = {
      safe:[
        "What’s your comfort show?",
        "What’s your most used emoji?",
        "What’s a small thing that makes you happy?"
      ],
      deep:[
        "What are you still healing from?",
        "What fear shaped you most?",
        "When did you last feel proud?"
      ],
      spicy:[
        "Have you stalked someone online?",
        "What’s your boldest date move?",
        "What’s your biggest red flag?"
      ]
    };

    const dares = {
      safe:[
        "Send a random emoji.",
        "Do your best impression of me.",
        "Say hi to a stranger."
      ],
      deep:[
        "Compliment someone in 3 ways.",
        "Share something vulnerable.",
        "Call a friend and say thanks."
      ],
      spicy:[
        "Text someone 'I have tea.'",
        "Show last 3 photos in your camera roll.",
        "Do a flirty dance for 5 sec."
      ]
    };

    function showResult(text){
      const result = document.getElementById("result");
      result.classList.remove("show");
      result.innerHTML = "";
      result.classList.add("show");

      let i = 0;
      function typeWriter() {
        if(i < text.length){
          result.innerHTML += text.charAt(i);
          i++;
          setTimeout(typeWriter,25);
        }
      }
      typeWriter();
    }

    function generateQuestion(){
      const list = questions[currentCategory];
      const random = list[Math.floor(Math.random()*list.length)];
      showResult("💘 "+random);
    }

    function generateTruth(){
      const list = truths[currentMode];
      const random = list[Math.floor(Math.random()*list.length)];
      showResult("💗 Truth: "+random);
    }

    function generateDare(){
      const list = dares[currentMode];
      const random = list[Math.floor(Math.random()*list.length)];
      showResult("🔥 Dare: "+random);
    }
</script>

</body>
</html>
